name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK + NDK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Prepare native assets
        run: |
          mkdir -p app/src/main/assets/bin
          # zstd remains for SQL dump and legacy .zst read paths.
          curl -fsSL "https://github.com/linuxwff789/wxhook/releases/download/native-binaries/zstd" \
            -o app/src/main/assets/bin/zstd
          chmod 755 app/src/main/assets/bin/*
          ls -lh app/src/main/assets/bin/

      - name: Download OpenList AAR
        run: |
          mkdir -p app/libs
          curl -fsSL "https://github.com/linuxwff789/openlist-android/releases/download/v0.3.4/openlistbridge.aar" \
            -o app/libs/openlistbridge.aar
          ls -lh app/libs/openlistbridge.aar

      - name: Setup signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "Signing config loaded"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wxbackup-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Xposed APK
        uses: actions/upload-artifact@v4
        with:
          name: wxbackup-xposed-debug
          path: xposed/build/outputs/apk/debug/xposed-debug.apk

      - name: Publish to Release
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: "wxbackup nightly build"
          artifacts: "app/build/outputs/apk/debug/app-debug.apk,xposed/build/outputs/apk/debug/xposed-debug.apk"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          removeArtifacts: true
          body: "自动构建 ${{ github.run_number }} - ${{ github.sha }}"
